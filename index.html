<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RangeSensei | AI Swing Coach</title>
    <meta name="description" content="Next-Generation Shot Analytics. No Hardware Required.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-bg: #121212;
            --color-surface: #1E1E1E;
            --color-text: #FFFFFF;
            --color-text-secondary: #B3B3B3;
            --color-accent: #FF6D00;
            --color-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 109, 0, 0.08) 0%, rgba(18, 18, 18, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 140px;
            height: auto;
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #FFF 0%, #B3B3B3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text {
            color: var(--color-accent);
            -webkit-text-fill-color: var(--color-accent);
        }

        p.subtitle {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 300;
            color: var(--color-text-secondary);
            margin-bottom: 56px;
            max-width: 600px;
            line-height: 1.4;
        }

        .form-container {
            background-color: var(--color-surface);
            padding: 8px;
            border-radius: 80px;
            border: 1px solid var(--color-border);
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 500px) {
            .form-container {
                flex-direction: column;
                border-radius: 16px;
                padding: 16px;
                gap: 12px;
            }
        }

        input[type="email"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 24px;
            color: var(--color-text);
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
        }

        input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        button {
            background-color: var(--color-accent);
            color: #000;
            font-family: inherit;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 40px;
            padding: 16px 32px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        @media (max-width: 500px) {
            button {
                width: 100%;
            }
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 109, 0, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <main class="container">
        <img src="assets/rangesensei-logo-main.png" alt="RangeSensei Logo" class="logo"
            onerror="this.style.display='none'">

        <h1>Master Your <span class="brand-text">Swing.</span></h1>
        <p class="subtitle">Next-Generation Shot Analytics. No heavy hardware required. The physics of your golf swing,
            decoded instantly on your phone.</p>

        <form class="form-container" action="mailto:support@rangesensei.io" method="GET" enctype="text/plain">
            <input type="email" name="body" placeholder="Enter your email to request early access..." required />
            <button type="submit">Join Waitlist</button>
        </form>
    </main>

    <footer>
        &copy; 2026 Adaptive Sensing, LLC. All rights reserved.
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = this.querySelector('input').value;



            const scriptURL = 'https://script.google.com/macros/s/AKfycbzPNZUWr46VSAxzei5TbS294-X_cdpABJVorlq2EPoxYdm-MekVFs7AcwSTR9y1Rv3l_g/exec';

            const originalButtonHtml = this.querySelector('button').innerHTML;
            this.querySelector('button').innerHTML = 'Sending...';

            fetch(`${scriptURL}?email=${encodeURIComponent(email)}`, {
                method: 'GET',
                mode: 'no-cors'
            }).then(() => {
                this.innerHTML = '<p style="padding: 16px 24px; color: var(--color-accent); font-weight: bold; width: 100%;">Transmission Initiated. You are on the list.</p>';
            }).catch(error => {
                console.error('Error!', error.message);
                window.location.href = `mailto:support@rangesensei.io?subject=Early Access Request&body=Please add ${email} to the early access developer waitlist.`;
                this.querySelector('button').innerHTML = originalButtonHtml;
            });
        });
    </script>
</body>

</html>
